# LG Travels — nginx reverse proxy.
# Install: sudo cp deploy/aws/nginx-lgtravels.conf /etc/nginx/sites-available/lgtravels
#          sudo ln -sf /etc/nginx/sites-available/lgtravels /etc/nginx/sites-enabled/lgtravels
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx
# Then run certbot (see RUNBOOK §6) — it rewrites these blocks to add :443 + SSL.

# ── Frontend: lgtravels.in + www ─────────────────────────────────────────────
server {
    listen 80;
    server_name lgtravels.in www.lgtravels.in;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
    }
}

# ── Backend API: api.lgtravels.in ────────────────────────────────────────────
server {
    listen 80;
    server_name api.lgtravels.in;
    client_max_body_size 25M;   # room for admin media metadata / large JSON

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
